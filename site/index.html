<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#03050d">
  <title>Happy Ending</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="space" aria-hidden="true"></canvas>
  <div class="nebula nebula-a" aria-hidden="true"></div>
  <div class="nebula nebula-b" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand-orbit" aria-label="Happy Ending">
      <svg class="brand-orbit-svg" viewBox="0 0 142 54" aria-hidden="true">
        <defs>
          <linearGradient id="orbitGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8fa8ff" stop-opacity=".20"/>
            <stop offset="52%" stop-color="#d39cff" stop-opacity=".24"/>
            <stop offset="100%" stop-color="#f0d2ff" stop-opacity=".14"/>
          </linearGradient>
        </defs>
        <g transform="rotate(-11 71 27)">
          <ellipse id="brand-orbit-path" class="brand-orbit-path" cx="71" cy="27" rx="68" ry="22"/>
          <text id="brand-orbit-star" class="brand-orbit-star" x="0" y="0" text-anchor="middle" dominant-baseline="central">✦</text>
        </g>
      </svg>
      <span class="brand-orbit-text">HAPPY ENDING</span>
    </div>
    <button id="sound-toggle" class="sound-toggle" type="button" aria-pressed="false">Sound off</button>
  </header>

  <main id="app" class="app">
    <section id="screen" class="screen" aria-live="polite"></section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
