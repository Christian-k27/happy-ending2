<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#03050d">
  <title>Happy Ending</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="space" aria-hidden="true"></canvas>
  <div class="nebula nebula-a" aria-hidden="true"></div>
  <div class="nebula nebula-b" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand-orbit" aria-label="Happy Ending">
      <div class="brand-orbit-ring" aria-hidden="true">
        <span class="brand-orbit-star">✦</span>
      </div>
      <span class="brand-orbit-text">HAPPY ENDING</span>
    </div>
    <button id="sound-toggle" class="sound-toggle" type="button" aria-pressed="false">Sound off</button>
  </header>

  <main id="app" class="app">
    <section id="screen" class="screen" aria-live="polite"></section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
